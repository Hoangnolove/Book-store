{% extends 'app/base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 border p-4 shadow-sm bg-white rounded">
            <h4 class="text-center mb-4 text-success">
                <i class="bi bi-key-fill"></i> Quên mật khẩu?
            </h4>
            <p class="small text-muted text-center">
                Nhập email bạn đã dùng để đăng ký. Chúng tôi sẽ gửi link đặt lại mật khẩu qua email cho bạn.
            </p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Địa chỉ Email</label>
                    <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Gửi yêu cầu đặt lại</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-decoration-none small text-secondary">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

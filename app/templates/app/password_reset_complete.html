{% extends 'app/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center shadow p-5 bg-white rounded border-top border-success border-4">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            </div>
            <h3 class="fw-bold">Đổi mật khẩu thành công!</h3>
            <p class="text-muted mt-3">
                Chúc mừng bạn, mật khẩu của bạn đã được cập nhật thành công. 
                Bây giờ bạn có thể đăng nhập vào hệ thống.
            </p>
            <div class="d-grid gap-2 col-6 mx-auto mt-4">
                <a href="{% url 'login' %}" class="btn btn-success">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

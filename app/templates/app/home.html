{%  extends 'app/base.html'  %}
{% load static %}
{% load humanize %}
{% block banner_slider  %}
<div id="carouselExampleControlsNoTouching" class="carousel container slide d-flex align-items-center gap-3" data-bs-touch="false" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="10000">
      <img src="{% static 'app/images/Banner/cook.jpg' %}" class="d-block w-100" alt="..." height='580'>
    </div>
    <div class="carousel-item">
      <img src="{% static 'app/images/Banner/history.png' %}" class="d-block w-100" alt="..."height='580'>
    </div>
    <div class="carousel-item">
      <img src="{% static 'app/images/Banner/human.jpg' %}" class="d-block w-100" alt="..."height='580'>
    </div>
    <div class="carousel-item">
      <img src="{% static 'app/images/Banner/stanford.png' %}" class="d-block w-100" alt="..."height='580'>
    </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControlsNoTouching" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>
{% endblock banner_slider %}
{% block main-content  %}

<div class="container my-4">
    <div class="product-section">
        <div class="row g-4">
            {% for product in products %}
            <div class="col-lg-3 col-md-4 col-sm-6">
                <div class="box-element product product-card h-100"
                    data-href="{% url 'detail' product.id %}"
                    style="cursor:pointer;">

                    <img class="thumbnail"
                        src="{{ product.ImageURL }}"
                        style="width:100%; height:250px; object-fit:contain;">

                    <h6 class="mt-2">
                        <strong>{{ product.name }}</strong>
                    </h6>

                    <div class="d-flex justify-content-between align-items-center">
                        <button data-product="{{ product.id }}"
                                data-action="add"
                                class="btn btn-outline-secondary add-btn update-cart">
                            add to cart
                        </button>

                        <span class="fw-bold">
                            {{ product.price_vnd }} đ
                        </span>
                    </div>

                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>



<br /><br /><br />
{% endblock main-content %}

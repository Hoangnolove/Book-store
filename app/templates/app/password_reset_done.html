{% extends 'app/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center shadow p-5 bg-white rounded">
            <div class="mb-4">
                <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
            </div>
            <h3 class="fw-bold">Kiểm tra hòm thư của bạn</h3>
            <p class="text-muted mt-3">
                Chúng tôi đã gửi một email hướng dẫn đặt lại mật khẩu. <br>
                Nếu không thấy trong hộp thư đến, hãy kiểm tra thư mục <strong>Spam (Thư rác)</strong>.
            </p>
            <a href="{% url 'home' %}" class="btn btn-outline-success mt-4">Quay về trang chủ</a>
        </div>
    </div>
</div>
{% endblock content %}
